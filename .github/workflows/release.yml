name: Build & Release userscript

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Generate changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "🎉 初始发布" > release_body.md
          else
            echo "## 本次更新内容" > release_body.md
            echo "" >> release_body.md
            git log --pretty=format:"- %s" "$PREVIOUS_TAG..HEAD" --no-merges >> release_body.md
            echo "" >> release_body.md
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_id }}
          name: "v${{ steps.version.outputs.version }} Build #${{ github.run_number }}"
          body_path: release_body.md
          files: dist/pikpakhelperplus.user.js
